<!-- cart.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/cart.css">
</head>
<body>
<header class="navbar">
    <div class="logo">Bombay <span class="highlight">Chaupati</span></div>
    
    <!-- Naya Hamburger Button (Sirf Mobile par dikhega) -->
    <button class="hamburger-toggle" id="menu-toggle" onclick="toggleMobileMenu()">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Nav links jisme ek id jodi hai 'nav-menu' -->
    <nav id="nav-menu">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
        <a href="cart.html" class="cart-link">
            <i class="fas fa-shopping-cart"></i> Cart <span id="nav-cart-count">0</span>
        </a>
    </nav>
</header>

    <main class="container cart-layout">
        <div class="cart-items-section">
            <h2>Your Selected Orders</h2>
            <div id="cart-list"></div>
        </div>
        <div class="cart-summary-section">
            <h2>Bill Summary</h2>
            <div class="bill-row"><span>Total Amount:</span><span id="total-price">₹0</span></div>
            <hr>
            <form id="checkout-form">
                <input type="text" id="cust-name" placeholder="Your Name" required>
                <textarea id="cust-address" placeholder="Delivery Address (Sikandra Local)" required rows="3"></textarea>
                <button type="submit" class="btn-whatsapp"><i class="fab fa-whatsapp"></i> Send Order via WhatsApp</button>
            </form>
        </div>
    </main>

     <footer>
        <p>&copy; 2026 Bombay Chaupati Cafe. Built for Client Demonstration Panel.</p>
    </footer>

    <script src="js/database.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
