<!-- product-detail.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dish Varieties</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/detail.css">
</head>
<body>
<header class="navbar">
    <div class="logo">Bombay <span class="highlight">Chaupati</span></div>
    
    <!-- Naya Hamburger Button (Sirf Mobile par dikhega) -->
    <button class="hamburger-toggle" id="menu-toggle" onclick="toggleMobileMenu()">
        <i class="fas fa-bars"></i>
    </button>
    
    <!-- Nav links jisme ek id jodi hai 'nav-menu' -->
    <nav id="nav-menu">
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact Us</a>
        <a href="cart.html" class="cart-link">
            <i class="fas fa-shopping-cart"></i> Cart <span id="nav-cart-count">0</span>
        </a>
    </nav>
</header>

    <main class="container detail-container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Menu</a>
        
        <div class="detail-wrapper">
            <div class="detail-img-box">
                <img id="dish-img" src="" alt="Dish Image">
            </div>
            <div class="detail-info-box">
                <h1 id="dish-name">Dish Name</h1>
                <p id="dish-desc" class="dish-desc">Description</p>
                
                <h3>Select Your Size / Variety:</h3>
                <form id="variety-form" class="variety-form"></form>

                <div class="action-block">
                    <div class="qty-selector">
                        <button type="button" id="qty-minus" class="qty-btn">−</button>
                        <span id="qty-value">1</span>
                        <button type="button" id="qty-plus" class="qty-btn">+</button>
                    </div>
                    <span id="live-price" class="live-price">₹0</span>
                    <button id="add-to-cart-btn" class="btn-add"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                </div>
            </div>
        </div>
    </main>
     <footer>
        <p>&copy; 2026 Bombay Chaupati Cafe. Built for Client Demonstration Panel.</p>
    </footer>

    <script src="js/database.js"></script>
    <script src="js/detail.js"></script>

    <!-- Custom White Card Pop-up Modal (Direct Inline Hidden State) -->
<div id="custom-confirm-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <div class="modal-img-container">
            <img id="modal-dish-img" src="" alt="Dish Snapshot" style="width: 80px; height: 80px; object-fit: cover; border-radius: 50%; margin-bottom: 15px; border: 2px solid #e74c3c;">
        </div>
        <h3 id="modal-message">Add this dish to your cart?</h3>
        <div class="modal-actions" id="modal-actions-box">
            <button id="modal-cancel-btn" class="btn-modal-cancel">Cancel</button>
            <button id="modal-ok-btn" class="btn-modal-ok">OK</button>
        </div>
    </div>
</div>
</body>
</html>
